# Simple workflow for Building and Testing the Pyrefly Website
# If upload_artifacts is true, the build artifacts will be uploadeded.
name: Build and Test Pyrefly Website
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  # Allow this workflow to be called by other workflows
  workflow_call:
    inputs:
      upload_artifacts:
        description: 'Whether to upload artifacts after build'
        required: false
        default: false
        type: boolean
  push:
    branches: [ main ]
  pull_request:
    types: [opened]
    paths:
      - 'website/**'

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: yarn
          cache-dependency-path: website/yarn.lock
      - name: Restore wasm tool cache
        id: wasm-tool-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-pack
            ~/.cargo/bin/wasm-opt
          key: ${{ runner.os }}-wasm-pack-0.15.0-wasm-opt-0.116.1
      - name: Install yarn deps
        uses: ./.github/actions/retry-command
        with:
          working-directory: website
          command: yarn install --frozen-lockfile
      - name: Install wasm-pack
        if: steps.wasm-tool-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/retry-command
        with:
          command: |
            cargo install wasm-pack --version 0.15.0 --locked
            cargo install wasm-opt --version 0.116.1 --locked
      - name: Fetch wasm Cargo dependencies
        uses: ./.github/actions/retry-command
        with:
          command: |
            rustup target add wasm32-unknown-unknown
            cargo fetch --locked --manifest-path pyrefly_wasm/Cargo.toml --target wasm32-unknown-unknown
      - name: Build
        working-directory: ./website
        run: cargo version && chmod +x scripts/build.sh && scripts/build.sh && yarn build-wasm-for-test
      - name: Typecheck
        working-directory: ./website
        run: yarn tsc --noEmit
      - name: Test
        working-directory: ./website
        run: yarn test
      - name: Get current date
        id: date
        if: ${{ inputs.upload_artifacts }}
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
      - name: Upload build artifacts
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v6
        with:
          name: website-build-${{ env.date }}
          path: website/build
          retention-days: 30
